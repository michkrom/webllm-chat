<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebLLM Chat with Tool Calling</title>
  <link href="./chat_tool_calling.css" rel="stylesheet" type="text/css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
</head>
<body>
  <div class="chat-container">
    <!-- Header with title and controls -->
    <div class="chat-header">
      <div class="header-left">
        <h1>WebLLM Chat with Tool Calling</h1>
        <label id="chatui-info-label" class="header-stats"></label>
      </div>
      <div class="header-controls">
        <div class="tool-mode-selector">
          <label for="tool-mode">Tool Calling Mode:</label>
          <select id="tool-mode">
            <option value="auto">Auto (Try OpenAI → Fallback to Structural)</option>
            <option value="openai">OpenAI Style (Hermes/Llama-3.1+)</option>
            <option value="structural">Structural Tag (Any model)</option>
          </select>
        </div>
        <div class="context-size-selector">
          <label for="context-size">Context Size:</label>
          <select id="context-size"></select>
        </div>
        <!-- Model selector -->
        <div class="chatui-select-wrapper">
          <select id="chatui-select"></select>
        </div>
      </div>
    </div>

    <!-- Chat messages display -->
    <div class="chatui-chat" id="chatui-chat"></div>

    <!-- Input area -->
    <div class="chatui-inputarea">
      <input
        id="chatui-input"
        type="text"
        class="chatui-input"
        placeholder="Type a message or /time, /location, /new, /dump, /help..."
      />
      <button id="chatui-send-btn" class="chatui-send-btn">Send</button>
      <button id="chatui-reset-btn" class="chatui-reset-btn">Reset</button>
    </div>
  </div>

  <script type="module" src="./chat_tool_calling.ts"></script>
</body>
</html>
